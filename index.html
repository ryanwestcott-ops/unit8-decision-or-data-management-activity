<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Management — The Decision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg-2: #0f1424;
  --surface: #151a2e;
  --surface-2: #1d2440;
  --border: #2a3252;
  --border-2: #3a4470;
  --text: #f0f4f8;
  --text-dim: #9aa3bd;
  --text-faint: #6b738e;
  --accent: #facc15;
  --good: #22c55e;
  --bad: #ef4444;
  --info: #38bdf8;

  --c-nhl: #ef4444;
  --c-stream: #c084fc;
  --c-cars: #fb923c;
  --c-jobs: #34d399;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

button { color: inherit; font-family: inherit; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

body {
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(250, 204, 21, 0.06), transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(56, 189, 248, 0.05), transparent 60%),
    var(--bg);
}

.app { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* ============ TOP NAV ============ */
.top-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 12px;
}
.brand-dot {
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 2px;
  transform: rotate(45deg);
}
.brand-sub {
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.nav-actions { display: flex; gap: 12px; align-items: center; }
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 16px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { border-color: var(--border-2); color: var(--text); }

/* ============ LANDING ============ */
.hero {
  padding: 48px 0 40px;
  text-align: center;
}
.hero-tag {
  display: inline-block;
  background: rgba(250, 204, 21, 0.1);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 4px;
  margin-bottom: 24px;
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(56px, 9vw, 96px);
  letter-spacing: 0.01em;
  line-height: 0.95;
  margin-bottom: 18px;
}
.hero h1 .yellow { color: var(--accent); }
.hero p.lead {
  font-size: 18px;
  color: var(--text-dim);
  max-width: 640px;
  margin: 0 auto 8px;
}

.info-strip {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 40px 0;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.info-stat .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}
.info-stat .value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  line-height: 1;
}
.info-stat .value-sub {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 4px;
}

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::before {
  content: '';
  width: 24px; height: 1px;
  background: var(--text-faint);
}
.section-label::after {
  content: '';
  flex: 1; height: 1px;
  background: var(--border);
}

.scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
  margin-top: 8px;
}

.scenario-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 24px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
  text-align: left;
  display: flex; flex-direction: column;
  color: var(--text);
  font-family: inherit;
}
.scenario-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent);
}
.scenario-card:hover {
  border-color: var(--card-accent);
  transform: translateY(-2px);
}
.scenario-icon {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  line-height: 1;
  color: var(--card-accent);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}
.scenario-card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.03em;
  margin-bottom: 8px;
}
.scenario-card .tagline {
  color: var(--text-dim);
  font-size: 14px;
  flex: 1;
}
.scenario-progress {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.scenario-progress .progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}
.scenario-progress .progress-row .pct {
  color: var(--card-accent);
  font-weight: 700;
}
.progress-bar {
  height: 4px;
  background: var(--bg-2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: var(--card-accent);
  transition: width 0.3s;
}

.how-it-works {
  margin: 48px 0;
}
.how-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.how-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.how-card .step {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  line-height: 1;
  color: var(--accent);
  margin-bottom: 8px;
}
.how-card h4 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 6px;
}
.how-card p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ============ SCENARIO VIEW ============ */
.scenario-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--scenario-color);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 32px;
  position: relative;
}
.scenario-header .kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--scenario-color);
  margin-bottom: 12px;
}
.scenario-header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 5vw, 56px);
  line-height: 1;
  letter-spacing: 0.02em;
  margin-bottom: 16px;
}
.scenario-header .intro {
  font-size: 16px;
  color: var(--text-dim);
  max-width: 720px;
  line-height: 1.6;
}

.stakeholders {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 28px;
}
@media (max-width: 600px) { .stakeholders { grid-template-columns: 1fr; } }

.competitor-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  border-left: 3px solid var(--card-accent);
}
.competitor-card .role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.competitor-card .name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}
.competitor-card .detail {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 14px;
}
.competitor-card .ask {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  color: var(--card-accent);
}

.budget-pill {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(250, 204, 21, 0.12);
  color: var(--accent);
  padding: 10px 18px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.05em;
  margin-top: 20px;
}

/* ============ PART SECTIONS ============ */
.part {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 24px;
}
.part-header {
  display: flex; align-items: baseline; gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}
.part-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--scenario-color);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 4px;
}
.part-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 0.02em;
  line-height: 1;
}
.part-intro {
  color: var(--text-dim);
  font-size: 15px;
  margin-bottom: 20px;
}

/* Data tables */
.data-block { margin: 16px 0 24px; }
.data-block h4 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}
table.data {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
table.data th, table.data td {
  border: 1px solid var(--border);
  padding: 8px 6px;
  text-align: center;
}
table.data th {
  background: var(--bg-2);
  color: var(--text-dim);
  font-weight: 500;
  letter-spacing: 0.05em;
}
table.data td.value {
  color: var(--text);
  font-weight: 500;
}

table.market {
  width: 100%;
  border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}
table.market th, table.market td {
  border: 1px solid var(--border);
  padding: 6px 12px;
  text-align: center;
}
table.market th {
  background: var(--bg-2);
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.05em;
  font-size: 11px;
  text-transform: uppercase;
}

/* Question block */
.question {
  margin: 24px 0;
  padding: 20px;
  background: var(--bg-2);
  border-radius: 8px;
  border-left: 3px solid var(--scenario-color);
}
.question .q-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--scenario-color);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 700;
}
.question .q-text {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.5;
}
.question .q-text b { color: var(--text); font-weight: 700; }

/* Answer panels split */
.split-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 700px) { .split-2 { grid-template-columns: 1fr; } }

.answer-panel {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  border-top: 2px solid var(--card-accent);
}
.answer-panel h5 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  color: var(--card-accent);
}

.input-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
}
.input-row label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  min-width: 80px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.input-row input[type="text"], .input-row input[type="number"] {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  border-radius: 4px;
  min-width: 0;
}
.input-row input:focus {
  outline: none;
  border-color: var(--card-accent);
}
.input-row .verdict {
  width: 24px; text-align: center;
  font-size: 16px;
}
.verdict.ok { color: var(--good); }
.verdict.no { color: var(--bad); }

.btn-row {
  display: flex; gap: 8px; margin-top: 14px;
}
.btn-check, .btn-reveal {
  flex: 1;
  padding: 8px 14px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn-check {
  background: var(--card-accent);
  color: var(--bg);
  border-color: var(--card-accent);
}
.btn-check:hover { filter: brightness(1.1); }
.btn-reveal {
  background: transparent;
  color: var(--text-dim);
}
.btn-reveal:hover { color: var(--text); border-color: var(--border-2); }

textarea.long {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 14px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  border-radius: 6px;
  resize: vertical;
  min-height: 80px;
}
textarea.long:focus {
  outline: none; border-color: var(--card-accent);
}

/* Visualizations */
.viz-container {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin: 16px 0;
}
.viz-container svg {
  width: 100%;
  height: auto;
  display: block;
}

/* Equation box */
.eqn {
  background: linear-gradient(135deg, rgba(250, 204, 21, 0.08), rgba(250, 204, 21, 0.02));
  border: 1px solid rgba(250, 204, 21, 0.3);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  margin: 16px 0;
}
.eqn .formula {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
}
.eqn .vars {
  color: var(--text-dim);
  font-size: 13px;
}

/* Pitch */
.pitch-box {
  background: var(--bg-2);
  border: 2px solid var(--scenario-color);
  border-radius: 10px;
  padding: 24px;
}
.choose-row {
  display: flex; gap: 12px; margin-bottom: 20px;
  flex-wrap: wrap;
}
.choose-btn {
  flex: 1;
  min-width: 160px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 18px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.03em;
  transition: all 0.15s;
}
.choose-btn:hover { border-color: var(--border-2); color: var(--text); }
.choose-btn.selected {
  background: rgba(34, 197, 94, 0.1);
  border-color: var(--good);
  color: var(--text);
}
.choose-btn.selected::after {
  content: ' ✓';
  color: var(--good);
}

.checklist {
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.checklist .check-item {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px;
  font-size: 14px;
  color: var(--text-dim);
}
.checklist input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--good);
  cursor: pointer;
}

.action-row {
  display: flex; gap: 12px; margin-top: 28px;
  flex-wrap: wrap;
}
.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 14px 24px;
  border-radius: 6px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }

.sticky-progress {
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  display: flex; align-items: center; gap: 16px;
}
.sticky-progress .back-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 14px;
  border-radius: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.sticky-progress .back-btn:hover { color: var(--text); }
.sticky-progress .progress-info {
  flex: 1;
  display: flex; align-items: center; gap: 12px;
}
.sticky-progress .progress-bar {
  flex: 1;
  max-width: 400px;
  height: 6px;
}
.sticky-progress .progress-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--scenario-color);
}

/* Footer */
.app-footer {
  margin-top: 64px;
  padding: 24px 0;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}

/* Gut-check (pre-calc decision) */
.gut-check {
  background: var(--surface);
  border: 1px dashed var(--border-2);
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 24px;
}
.gut-check .gc-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.gut-check h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.03em;
  margin-bottom: 6px;
}
.gut-check p.gc-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.gut-check .gc-buttons {
  display: flex; gap: 10px; margin-bottom: 12px;
  flex-wrap: wrap;
}
.gut-check .gc-btn {
  flex: 1; min-width: 140px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 12px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.04em;
}
.gut-check .gc-btn:hover { border-color: var(--border-2); color: var(--text); }
.gut-check .gc-btn.selected {
  background: rgba(250, 204, 21, 0.08);
  border-color: var(--accent);
  color: var(--text);
}
.gut-check textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13px;
  border-radius: 5px;
  resize: vertical;
  min-height: 48px;
}
.gut-check textarea:focus { outline: none; border-color: var(--accent); }

/* Gut-recall callout (shown in pitch) */
.gut-recall {
  background: rgba(250, 204, 21, 0.08);
  border: 1px solid rgba(250, 204, 21, 0.3);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 14px 18px;
  margin-bottom: 18px;
  font-size: 14px;
  line-height: 1.55;
}
.gut-recall .gr-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;

// ============================================================
// STATS HELPERS
// ============================================================
function computeStats(data) {
  const sorted = [...data].sort((a, b) => a - b);
  const n = sorted.length;
  const mean = data.reduce((a, b) => a + b, 0) / n;
  const median = n % 2 === 0
    ? (sorted[n/2 - 1] + sorted[n/2]) / 2
    : sorted[Math.floor(n/2)];

  const counts = {};
  data.forEach(x => counts[x] = (counts[x] || 0) + 1);
  const maxCount = Math.max(...Object.values(counts));
  let mode;
  if (maxCount === 1) {
    mode = 'none';
  } else {
    const modes = Object.entries(counts).filter(([k, v]) => v === maxCount).map(([k]) => +k);
    mode = modes.length === 1 ? String(modes[0]) : modes.join(', ');
  }

  // Q1/Q3 using "halves" method (matches the textbook examples)
  const lower = n % 2 === 0 ? sorted.slice(0, n/2) : sorted.slice(0, Math.floor(n/2));
  const upper = n % 2 === 0 ? sorted.slice(n/2) : sorted.slice(Math.ceil(n/2));
  function medOf(arr) {
    const m = arr.length;
    return m % 2 === 0 ? (arr[m/2-1] + arr[m/2]) / 2 : arr[Math.floor(m/2)];
  }
  const q1 = medOf(lower);
  const q3 = medOf(upper);
  const min = sorted[0];
  const max = sorted[n-1];

  return {
    mean: round(mean, 2),
    median: round(median, 2),
    mode: mode,
    q1: round(q1, 2),
    q3: round(q3, 2),
    iqr: round(q3 - q1, 2),
    range: round(max - min, 2),
    min, max,
    sorted
  };
}

function round(n, digits) {
  const f = Math.pow(10, digits);
  return Math.round(n * f) / f;
}

function formatNum(n, digits = 2) {
  if (typeof n !== 'number') return n;
  if (Number.isInteger(n) && digits === 2) return n.toString();
  return n.toFixed(digits).replace(/\.?0+$/, '');
}

// Check answer with tolerance
function check(input, expected, tolerance = 0.05) {
  const raw = String(input).trim();
  if (raw === '') return null;
  // Allow comma list for modes
  if (typeof expected === 'string') {
    return raw.replace(/\s/g, '').toLowerCase() === expected.replace(/\s/g, '').toLowerCase();
  }
  const num = parseFloat(raw);
  if (isNaN(num)) return false;
  const diff = Math.abs(num - expected);
  const tol = Math.max(tolerance, Math.abs(expected) * 0.02);
  return diff <= tol;
}

  const expected = expectedFields();
  const s = getScenarioState(id);

  expected.forEach(k => {

  if (s.choice) filled += 1;
  if (s.pitch && s.pitch.trim().length >= 50) filled += 1;
  return Math.min(1, filled / (expected.length + 2));
}

function renderBoxplotSVG(stats1, stats2, c1Name, c2Name, color1, color2, dataMin, dataMax) {
  // Use computed sensible range
  const allData = [];
  [stats1, stats2].forEach(s => { if (s) { allData.push(s.min, s.max); } });
  let xMin = Math.min(...allData);
  let xMax = Math.max(...allData);
  if (!isFinite(xMin)) xMin = dataMin || 0;
  if (!isFinite(xMax)) xMax = dataMax || 100;
  const pad = (xMax - xMin) * 0.1 || 1;
  xMin = Math.floor((xMin - pad) / 10) * 10;
  xMax = Math.ceil((xMax + pad) / 10) * 10;

  const w = 720, h = 240, marginL = 90, marginR = 40, marginT = 30, marginB = 50;
  const plotW = w - marginL - marginR, plotH = h - marginT - marginB;
  const xScale = v => marginL + ((v - xMin) / (xMax - xMin)) * plotW;

  function drawBox(stats, y, color, label) {
    if (!stats) return `<text x="${marginL - 12}" y="${y+5}" fill="#6b738e" font-family="JetBrains Mono" font-size="12" text-anchor="end">${label}</text>`;
    const x1 = xScale(stats.min), xq1 = xScale(stats.q1), xm = xScale(stats.median),
          xq3 = xScale(stats.q3), x2 = xScale(stats.max);
    const boxH = 40;
    return `
      <text x="${marginL - 12}" y="${y+5}" fill="${color}" font-family="Bebas Neue" font-size="16" text-anchor="end" letter-spacing="1">${label}</text>
      <line x1="${x1}" y1="${y}" x2="${xq1}" y2="${y}" stroke="${color}" stroke-width="2"/>
      <line x1="${xq3}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="2"/>
      <line x1="${x1}" y1="${y-8}" x2="${x1}" y2="${y+8}" stroke="${color}" stroke-width="2"/>
      <line x1="${x2}" y1="${y-8}" x2="${x2}" y2="${y+8}" stroke="${color}" stroke-width="2"/>
      <rect x="${xq1}" y="${y - boxH/2}" width="${xq3-xq1}" height="${boxH}" fill="none" stroke="${color}" stroke-width="2"/>
      <line x1="${xm}" y1="${y - boxH/2}" x2="${xm}" y2="${y + boxH/2}" stroke="${color}" stroke-width="2.5"/>
    `;
  }

  // Axis
  let ticks = '';
  const tickInterval = (xMax - xMin) > 200 ? 50 : (xMax - xMin) > 50 ? 10 : 5;
  for (let v = xMin; v <= xMax; v += tickInterval) {
    const x = xScale(v);
    ticks += `<line x1="${x}" y1="${h - marginB}" x2="${x}" y2="${h - marginB + 5}" stroke="#3a4470" stroke-width="1"/>
              <text x="${x}" y="${h - marginB + 18}" fill="#9aa3bd" font-family="JetBrains Mono" font-size="11" text-anchor="middle">${v}</text>`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
    <line x1="${marginL}" y1="${h - marginB}" x2="${w - marginR}" y2="${h - marginB}" stroke="#3a4470" stroke-width="1"/>
    ${ticks}
    ${drawBox(stats1, marginT + plotH * 0.30, color1, c1Name)}
    ${drawBox(stats2, marginT + plotH * 0.75, color2, c2Name)}
  </svg>`;
}

function renderScatterSVG(market, c1, c2, scenario) {
  const allX = market.data.map(d => d[0]).concat([c1.predictor || -999, c2.predictor || -999].filter(v => v !== -999));
  const allY = market.data.map(d => d[1]);
  let xMin = Math.min(...allX), xMax = Math.max(...allX);
  let yMin = Math.min(...allY), yMax = Math.max(...allY);
  const padX = (xMax - xMin) * 0.08;
  const padY = (yMax - yMin) * 0.08;
  xMin = Math.floor((xMin - padX));
  xMax = Math.ceil((xMax + padX));
  yMin = Math.floor((yMin - padY));
  if (yMin > 0) yMin = 0;
  yMax = Math.ceil(yMax + padY);

  const w = 720, h = 480, mL = 70, mR = 30, mT = 30, mB = 60;
  const plotW = w - mL - mR, plotH = h - mT - mB;
  const xs = v => mL + ((v - xMin) / (xMax - xMin)) * plotW;
  const ys = v => mT + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

  // Gridlines
  const xTickCount = 10;
  const yTickCount = 8;
  let grid = '';
  for (let i = 0; i <= xTickCount; i++) {
    const x = mL + (i / xTickCount) * plotW;
    grid += `<line x1="${x}" y1="${mT}" x2="${x}" y2="${mT + plotH}" stroke="#2a3252" stroke-width="0.5"/>`;
  }
  for (let i = 0; i <= yTickCount; i++) {
    const y = mT + (i / yTickCount) * plotH;
    grid += `<line x1="${mL}" y1="${y}" x2="${mL + plotW}" y2="${y}" stroke="#2a3252" stroke-width="0.5"/>`;
  }

  // Axis labels
  let xLabels = '';
  for (let i = 0; i <= xTickCount; i++) {
    const v = xMin + ((xMax - xMin) * i / xTickCount);
    const x = xs(v);
    xLabels += `<text x="${x}" y="${mT + plotH + 18}" fill="#9aa3bd" font-family="JetBrains Mono" font-size="10" text-anchor="middle">${formatNum(v, 0)}</text>`;
  }
  let yLabels = '';
  for (let i = 0; i <= yTickCount; i++) {
    const v = yMin + ((yMax - yMin) * i / yTickCount);
    const y = ys(v);
    yLabels += `<text x="${mL - 8}" y="${y + 3}" fill="#9aa3bd" font-family="JetBrains Mono" font-size="10" text-anchor="end">${formatNum(v, 1)}</text>`;
  }

  // Data points
  let points = '';
  market.data.forEach(([x, y]) => {
    points += `<circle cx="${xs(x)}" cy="${ys(y)}" r="4" fill="#facc15"/>`;
  });

  // Regression line
  const { slope, intercept } = market.regression;
  const x1 = xMin, y1 = slope * x1 + intercept;
  const x2 = xMax, y2 = slope * x2 + intercept;
  const cy1 = Math.max(yMin, Math.min(yMax, y1));
  const cy2 = Math.max(yMin, Math.min(yMax, y2));
  const cx1 = (cy1 - intercept) / slope;
  const cx2 = (cy2 - intercept) / slope;
  const line = `<line x1="${xs(cx1)}" y1="${ys(cy1)}" x2="${xs(cx2)}" y2="${ys(cy2)}" stroke="rgba(250,204,21,0.6)" stroke-width="1.5" stroke-dasharray="4 4"/>`;

  // Highlight predicted points for the two competitors
  let predicted = '';
  [c1, c2].forEach(c => {
    if (c && c.predictor !== undefined && c.predictor !== null) {
      const py = slope * c.predictor + intercept;
      predicted += `<circle cx="${xs(c.predictor)}" cy="${ys(py)}" r="7" fill="none" stroke="${c.color}" stroke-width="2"/>
                    <line x1="${xs(c.predictor)}" y1="${ys(py)}" x2="${xs(c.predictor)}" y2="${ys(yMin)}" stroke="${c.color}" stroke-width="1" stroke-dasharray="2 3" opacity="0.7"/>`;
    }
  });

  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    ${grid}
    ${line}
    ${points}
    ${predicted}
    <line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT + plotH}" stroke="#3a4470" stroke-width="1"/>
    <line x1="${mL}" y1="${mT + plotH}" x2="${mL + plotW}" y2="${mT + plotH}" stroke="#3a4470" stroke-width="1"/>
    ${xLabels}
    ${yLabels}
    <text x="${mL + plotW/2}" y="${h - 12}" fill="#f0f4f8" font-family="JetBrains Mono" font-size="12" text-anchor="middle">${market.xLabel}</text>
    <text x="20" y="${mT + plotH/2}" fill="#f0f4f8" font-family="JetBrains Mono" font-size="12" text-anchor="middle" transform="rotate(-90 20 ${mT + plotH/2})">${market.yLabel}</text>
  </svg>`;
}

function labelForSpan(sc) {
  if (sc.id === 'stream') return 'streams';
  if (sc.id === 'cars') return 'weeks';
  if (sc.id === 'jobs') return 'weeks';
  return 'seasons';
}
function verbForScenario(sc, kind) {
  if (sc.id === 'cars') return 'is the cheaper to run';
  if (sc.id === 'jobs') return 'earns more on average';
  if (sc.id === 'stream') return 'pulls more viewers';
  return 'scores more';
}
function marketPartTitle(sc) {
  if (sc.id === 'cars') return 'Market Pricing';
  if (sc.id === 'jobs') return 'Job Market Data';
  if (sc.id === 'stream') return 'Sponsorship Market';
  return 'What\u2019s a Fair Contract?';
}
function marketPartIntro(sc) {
  if (sc.id === 'nhl') return "Your scout pulled last season's points and current contract value for 14 NHL forwards.";
  if (sc.id === 'stream') return 'You looked up 14 streamers your size and how much they\u2019re paid per month.';
  if (sc.id === 'cars') return 'You pulled 14 listings for similar compact sedans in your area to see how km affects price.';
  if (sc.id === 'jobs') return 'You collected weekly hours + earnings data from 14 part-time roles in your area.';
}
function predictPartTitle(sc) {
  if (sc.id === 'cars') return 'Predicting a Fair Price';
  if (sc.id === 'jobs') return 'Predicting Fair Earnings';
  return 'Predicting Fair Value';
}
function predictYDescription(sc) {
  if (sc.id === 'nhl') return 'predicted contract (millions $)';
  if (sc.id === 'stream') return 'predicted sponsorship ($/month)';
  if (sc.id === 'cars') return 'predicted asking price ($1,000s)';
  if (sc.id === 'jobs') return 'predicted weekly earnings ($)';
}
function valueComparisonLabel(sc) {
  if (sc.id === 'nhl') return 'asking contract';
  if (sc.id === 'stream') return 'asking sponsorship';
  if (sc.id === 'cars') return 'asking price';
  if (sc.id === 'jobs') return 'mean weekly earnings (from Part 1)';
}

function answerPanel(scenarioId, title, color, fields) {
  const s = getScenarioState(scenarioId);
  return `
    <div class="answer-panel" style="--card-accent: ${color};">
      <h5>${title}</h5>
      ${fields.map(f => {
        const val = s.inputs[f.key] || '';
        return `<div class="input-row">
          <label>${f.label}</label>
          <input type="text" id="input-${f.key}" value="${escapeHtml(val)}"
                 data-key="${f.key}" data-expected="${f.expected}" data-tolerance="${f.tolerance || 0.05}" data-istext="${f.isText ? 1 : 0}"
                 oninput="onInput('${scenarioId}', '${f.key}', this.value); updateBoxplot('${scenarioId}');"
                 placeholder="...">
          <span class="verdict" id="verdict-${f.key}">${verdictMark(val, f.expected, f.tolerance, f.isText)}</span>
        </div>`;
      }).join('')}
      <div class="btn-row">
        <button class="btn-check" onclick="checkPanel('${scenarioId}', ${JSON.stringify(fields.map(f => f.key)).replace(/"/g, "'")})">Check</button>
        <button class="btn-reveal" onclick="revealPanel(event, '${scenarioId}')">Reveal</button>
      </div>
    </div>
  `;
}

function verdictMark(val, expected, tolerance, isText) {
  if (val === '' || val === undefined) return '';
  const ok = check(val, isText ? String(expected) : expected, tolerance);
  if (ok === null) return '';
  return ok ? '<span class="ok">✓</span>' : '<span class="no">✕</span>';
}

function renderDataRow(data, label) {
  const cols = data.map((_, i) => `<th>${label}${i+1}</th>`).join('');
  const vals = data.map(d => `<td class="value">${d}</td>`).join('');
  return `<table class="data"><thead><tr>${cols}</tr></thead><tbody><tr>${vals}</tr></tbody></table>`;
}

function renderMarketTable(data, xLabel, yLabel) {
  const half = Math.ceil(data.length / 2);
  const left = data.slice(0, half);
  const right = data.slice(half);
  let rows = '';
  for (let i = 0; i < half; i++) {
    const l = left[i], r = right[i];
    rows += `<tr>
      <td>${l ? l[0] : ''}</td><td>${l ? l[1] : ''}</td>
      <td>${r ? r[0] : ''}</td><td>${r ? r[1] : ''}</td>
    </tr>`;
  }
  return `<table class="market">
    <thead><tr>
      <th>${xLabel}</th><th>${yLabel}</th>
      <th>${xLabel}</th><th>${yLabel}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function checklistItem(scenarioId, key, label) {
  const s = getScenarioState(scenarioId);
  const checked = s.checks[key] ? 'checked' : '';
  return `<div class="check-item">
    <input type="checkbox" ${checked} onchange="toggleCheck('${scenarioId}', '${key}', this.checked)">
    <label>${label}</label>
  </div>`;
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function onInput(scenarioId, key, value) {
  setInput(scenarioId, key, value);
  // verdict
  const input = document.getElementById('input-' + key);
  if (input) {
    const expected = parseFloat(input.dataset.expected);
    const tolerance = parseFloat(input.dataset.tolerance);
    const isText = input.dataset.istext === '1';
    const verd = document.getElementById('verdict-' + key);
    if (verd) verd.innerHTML = verdictMark(value, isText ? input.dataset.expected : expected, tolerance, isText);
  }
  updateTopProgress(scenarioId);
}

function onPitch(scenarioId, value) {
  getScenarioState(scenarioId).pitch = value;
  saveState();
  updateTopProgress(scenarioId);
}

function chooseSign(scenarioId, choice) {
  getScenarioState(scenarioId).choice = choice;
  saveState();
  renderScenario(scenarioId);
}

function chooseGut(scenarioId, choice) {
  getScenarioState(scenarioId).gutChoice = choice;
  saveState();
  renderScenario(scenarioId);
}

function onGutReason(scenarioId, value) {
  getScenarioState(scenarioId).gutReason = value;
  saveState();
}

function toggleCheck(scenarioId, key, val) {
  getScenarioState(scenarioId).checks[key] = val;
  saveState();
}

function checkPanel(scenarioId, keys) {
  keys.forEach(key => {
    const input = document.getElementById('input-' + key);
    if (!input) return;
    const verd = document.getElementById('verdict-' + key);
    const expected = parseFloat(input.dataset.expected);
    const tolerance = parseFloat(input.dataset.tolerance);
    const isText = input.dataset.istext === '1';
    if (verd) verd.innerHTML = verdictMark(input.value, isText ? input.dataset.expected : expected, tolerance, isText);
  });
}

function revealPanel(event, scenarioId) {
  const btn = event.target;
  const panel = btn.closest('.answer-panel');
  if (!panel) return;
  panel.querySelectorAll('input').forEach(inp => {
    const key = inp.dataset.key;
    const expected = inp.dataset.expected;
    inp.value = expected;
    setInput(scenarioId, key, expected);
    const verd = document.getElementById('verdict-' + key);
    if (verd) verd.innerHTML = '<span style="color: var(--info);">\u2192</span>';
  });
  updateBoxplot(scenarioId);
  updateTopProgress(scenarioId);
}

function updateTopProgress(scenarioId) {
  const pct = Math.round(scenarioProgress(scenarioId) * 100);
  const bar = document.getElementById('topProgress');
  const lbl = document.getElementById('topProgressPct');
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = pct + '%';
}

function updateBoxplot(scenarioId) {
  const container = document.getElementById('boxplotViz');
  if (!container) return;
  const sc = SCENARIOS[scenarioId];
  const s = getScenarioState(scenarioId);
  function buildStats(prefix, fallbackData) {
    const fb = computeStats(fallbackData);
    const q1 = parseFloat(s.inputs['q1_' + prefix]);
    const q3 = parseFloat(s.inputs['q3_' + prefix]);
    const median = parseFloat(s.inputs['median' + prefix]);
    const useStudent = !isNaN(q1) && !isNaN(q3) && !isNaN(median);
    if (useStudent) {
      const minS = parseFloat(s.inputs['min_' + prefix]);
      const maxS = parseFloat(s.inputs['max_' + prefix]);
      return {
        q1, q3, median,
        min: isNaN(minS) ? fb.min : minS,
        max: isNaN(maxS) ? fb.max : maxS
      };
    }
    return null;
  }
  const stats1 = buildStats('1', sc.competitor1.data);
  const stats2 = buildStats('2', sc.competitor2.data);
  container.innerHTML = renderBoxplotSVG(
    stats1, stats2,
    sc.competitor1.name.split(' ')[0].toUpperCase(),
    sc.competitor2.name.split(' ')[0].toUpperCase(),
    sc.competitor1.color, sc.competitor2.color,
    null, null
  );
  if (!stats1 || !stats2) {
    container.insertAdjacentHTML('beforeend', '<p style="text-align:center; color: var(--text-faint); font-size: 12px; margin-top: 8px; font-family: \'JetBrains Mono\', monospace;">Enter Q\u2081, median, and Q\u2083 above to render the boxplot.</p>');
  }
}

function resetScenario(id) {
  if (!confirm('Clear all work for this scenario?')) return;
  STATE[id] = { inputs: {}, choice: null, pitch: '', checks: {}, gutChoice: null, gutReason: '' };
  saveState();
  renderScenario(id);
}
function resetAll() {
  if (!confirm('Clear all work for ALL scenarios?')) return;
  STATE = {};
  saveState();
  render();
}

// ============================================================
// RENDER ROOT
// ============================================================
function render() {
  const route = getRoute();
  if (route.view === 'scenario') renderScenario(route.id);
  else renderHome();
  window.scrollTo(0, 0);
}

render();
</script>
</body>
</html>
